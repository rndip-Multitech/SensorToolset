<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sensor Toolkit</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body.login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .login-page section {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px 20px 40px;
        }
        .login-card {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 36px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
            width: 100%;
            max-width: 430px;
        }
        .login-card h2 {
            font-size: 22px;
            font-weight: 600;
            color: #00394d;
            margin: 0 0 24px 0;
            letter-spacing: -0.3px;
        }
        .login-card .form-group {
            margin-bottom: 20px;
        }
        .login-card label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        .login-card input[type="text"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .login-card input:focus {
            outline: none;
            border-color: #2196f3;
        }
        .login-card .submit-row {
            margin-top: 28px;
        }
        .login-card button[type="submit"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
        }
        .login-card .error-msg {
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            color: #b71c1c;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .login-card .error-msg.visible {
            display: block;
        }
    </style>
</head>
<body class="login-page">
    <header>
        <div class="container">
            <div class="my-logo">
                <img src="/static/MultiTech_Logo.png" alt="MultiTech Logo">
                <h1>Sensor Toolkit</h1>
            </div>
        </div>
    </header>

    <section>
        <div class="login-card">
            <h2>Sign In</h2>
            <div id="loginError" class="error-msg" role="alert"></div>
            <form method="post" action="/login" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <div class="submit-row">
                    <button type="submit">Login</button>
                </div>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            var err = document.getElementById('loginError');
            err.classList.remove('visible');
            err.textContent = '';
        });
        var qs = new URLSearchParams(window.location.search);
        if (qs.get('error')) {
            var err = document.getElementById('loginError');
            err.textContent = qs.get('error');
            err.classList.add('visible');
        }
    </script>
</body>
</html>
