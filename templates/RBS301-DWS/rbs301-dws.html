    <section>
        <div class="container">
            <img src="rbs301-dws.png" alt="RBS301-DWS Sensor" class="sensor-image" style="max-width: 200px; margin-bottom: 20px;">


    <!-- =========================== -->
    <!-- DOOR-WINDOW SETTINGS SECTION -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Door-Window Notification Settings</h3>

        <!-- Door/Window Close -->
        <div class="row">

            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="notifyClose">
                    Send Notification on Door/Window Close
                </label>
            </div>

            <div class="column" id="closeTimeContainer" style="display:none;">
                <label class="inline-label" for="closeTime">Hold Time:</label>
                <select id="closeTime" class="input-medium">
                    <option value="0000">0 Seconds</option>
                    <option value="0001">0.25 Seconds</option>
                    <option value="0002">0.5 Seconds</option>
                    <option value="0004">1 Second</option>
                    <option value="0008">2 Seconds</option>
                    <option value="000c">3 Seconds</option>
                    <option value="0010">4 Seconds</option>
                    <option value="0014">5 Seconds</option>
                    <option value="0028">10 Seconds</option>
                    <option value="0078">30 Seconds</option>
                    <option value="00f0">1 Minute</option>
                    <option value="04b0">5 Minutes</option>
                    <option value="0960">10 Minutes</option>
                    <option value="1c20">30 Minutes</option>
                    <option value="3840">1 Hour</option>
                    <option value="7080">2 Hours</option>
                    <option value="a8c0">3 Hours</option>
                    <option value="e100">4 Hours</option>
                </select>
            </div>
        </div>


        <!-- Door/Window Open -->
        <div class="row">

            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="notifyOpen">
                    Send Notification on Door/Window Open
                </label>
            </div>

            <div class="column" id="openTimeContainer" style="display:none;">
                <label class="inline-label" for="openTime">Hold Time:</label>
                <select id="openTime" class="input-medium">
                    <option value="0000">0 Seconds</option>
                    <option value="0001">0.25 Seconds</option>
                    <option value="0002">0.5 Seconds</option>
                    <option value="0004">1 Second</option>
                    <option value="0008">2 Seconds</option>
                    <option value="000c">3 Seconds</option>
                    <option value="0010">4 Seconds</option>
                    <option value="0014">5 Seconds</option>
                    <option value="0028">10 Seconds</option>
                    <option value="0078">30 Seconds</option>
                    <option value="00f0">1 Minute</option>
                    <option value="04b0">5 Minutes</option>
                    <option value="0960">10 Minutes</option>
                    <option value="1c20">30 Minutes</option>
                    <option value="3840">1 Hour</option>
                    <option value="7080">2 Hours</option>
                    <option value="a8c0">3 Hours</option>
                    <option value="e100">4 Hours</option>
                </select>
            </div>

            <button id="about-dws-button" class="help-button">?</button>
        </div>

    </section>


    <!-- =========================== -->
    <!-- GENERATED HEX SECTION       -->
    <!-- =========================== -->
    <section id="hex-section" class="section" style="display:none;">
        <div class="row">
            <h3 class="inline-title">Generated Hexcode:</h3>
            <span id="hex-output" class="hex-display"></span>
        </div>

        <button id="copy-button" class="action-button">Copy Hexcode</button>
        <button id="how-button" class="action-button">How to Use Hexcode</button>
        <button id="schedule-button" class="action-button" style="background-color: #2196f3; color: white;">Schedule Downlink</button>
    </section>


    <!-- =========================== -->
    <!-- GENERATE BUTTON             -->
    <!-- =========================== -->
    <button id="generate-button" class="generate-button">
        Generate Hexcode
    </button>


        </div>
    </section>

    <script src="js/script.js?v=1"></script>
</body>
