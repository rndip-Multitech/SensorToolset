<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireless Ultrasonic Level Sensor Configuration</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="css/styles.css?v=1">
</head>

<body>
    <header>
        <div class="container">
            <div class="my-logo">
                <img src="../MultiTech_Logo.png" alt="MultiTech Logo">
                <h1>Wireless Ultrasonic Level Sensor Configuration</h1>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-leftside">
            <ul>
                <li class="item">
                    <img src="../NetworkDashboard-0.1/static/icons/house.svg" width="24" height="24" class="icon-margin" alt="Home">
                    <a href="../index.html">Home</a>
                </li>
            </ul>
        </div>
        <div class="nav-profile">
            <p>&copy; 2024 Multitech Systems, Inc.</p>
            <p>All rights reserved.</p>
        </div>
    </nav>

    <section>
        <div class="container">
            <img src="rbs306-uls.png" alt="RBS306-ULS Sensor" class="sensor-image" style="max-width: 200px; margin-bottom: 20px;">


    <!-- =========================== -->
    <!-- REPORTING TYPE SECTION      -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Reporting Type</h3>

        <div class="row">
            <div class="column">
                <label class="inline-label" for="reportingType">Reporting Type:</label>
                <select id="reportingType" class="input-medium">
                    <option value="threshold">Threshold</option>
                    <option value="roc">Report on Change</option>
                </select>
            </div>
        </div>

    </section>


    <!-- =========================== -->
    <!-- THRESHOLD SETTINGS SECTION  -->
    <!-- =========================== -->
    <section id="thresholdSection" class="section">

        <h3 class="section-title">Threshold Settings</h3>

        <!-- Lower Distance Threshold -->
        <div class="row">
            <div class="column">
                <label class="inline-label" for="lowerDistanceThreshold">Lower Distance Threshold:</label>
                <select id="lowerDistanceThreshold" class="input-medium">
                    <script>
                        for (let i = 200; i <= 9900; i += 100) {
                            document.write('<option value="' + i + '">' + i + '</option>');
                        }
                    </script>
                </select>
            </div>
        </div>

        <!-- Upper Distance Threshold -->
        <div class="row">
            <div class="column">
                <label class="inline-label" for="upperDistanceThreshold">Upper Distance Threshold:</label>
                <select id="upperDistanceThreshold" class="input-medium">
                    <script>
                        for (let i = 500; i <= 9900; i += 100) {
                            document.write('<option value="' + i + '">' + i + '</option>');
                        }
                    </script>
                </select>
            </div>
        </div>

    </section>


    <!-- =========================== -->
    <!-- REPORT ON CHANGE SECTION    -->
    <!-- =========================== -->
    <section id="rocSection" class="section" style="display: none;">

        <h3 class="section-title">Report on Change Settings</h3>

        <!-- Distance Increase -->
        <div class="row">
            <div class="column">
                <label class="inline-label" for="distanceIncrease">Distance Increase:</label>
                <select id="distanceIncrease" class="input-small">
                    <script>
                        for (let i = 0; i <= 100; i++) {
                            document.write('<option value="' + i + '">' + i + '</option>');
                        }
                    </script>
                </select>
            </div>
        </div>

        <!-- Distance Decrease -->
        <div class="row">
            <div class="column">
                <label class="inline-label" for="distanceDecrease">Distance Decrease:</label>
                <select id="distanceDecrease" class="input-small">
                    <script>
                        for (let i = 0; i <= 100; i++) {
                            document.write('<option value="' + i + '">' + i + '</option>');
                        }
                    </script>
                </select>
            </div>
        </div>

    </section>


    <!-- =========================== -->
    <!-- HOLD TIME                   -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Hold Time</h3>

        <div class="row">
            <div class="column">
                <label class="inline-label" for="holdTimeScale">Hold Time:</label>
                <select id="holdTimeScale" class="input-medium">
                    <option value="seconds">Seconds</option>
                    <option value="minutes">Minutes</option>
                </select>
            </div>

            <div class="column">
                <label class="inline-label" for="holdTimePeriod">Time Period:</label>
                <select id="holdTimePeriod" class="input-small">
                    <script>
                        for (let i = 1; i <= 127; i++) {
                            document.write('<option value="' + i + '">' + i + '</option>');
                        }
                    </script>
                </select>
            </div>
        </div>

    </section>


    <!-- =========================== -->
    <!-- PERIODIC REPORTING          -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Periodic Reporting</h3>

        <div class="row">
            <div class="column">
                <label class="inline-label" for="periodicReporting">Time Scale:</label>
                <select id="periodicReporting" class="input-medium">
                    <option value="disabled">Disabled</option>
                    <option value="minutes">Minutes</option>
                    <option value="hours">Hours</option>
                </select>
            </div>

            <div class="column">
                <label class="inline-label" id="timePeriodLabel" for="timePeriod">Time Period:</label>
                <select id="timePeriod" class="input-small"></select>
            </div>

            <button id="about-reporting-button" class="help-button">?</button>
        </div>

    </section>


    <!-- =========================== -->
    <!-- GENERATED HEX SECTION       -->
    <!-- =========================== -->
    <section id="hex-section" class="section" style="display:none;">
        <div class="row">
            <h3 class="inline-title">Generated Hexcode:</h3>
            <span id="hex-output" class="hex-display"></span>
        </div>

        <button id="copy-button" class="action-button">Copy Hexcode</button>
        <button id="how-button" class="action-button">How to Use Hexcode</button>
    </section>


    <!-- =========================== -->
    <!-- GENERATE BUTTON             -->
    <!-- =========================== -->
    <button id="generate-button" class="generate-button">
        Generate Hexcode
    </button>


        </div>
    </section>

    <script src="js/script.js?v=1"></script>
</body>
</html>
