<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioBridge Temperature & Humidity Sensor Configuration</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="css/styles.css?v=1">
</head>

<body>
    <header>
        <div class="container">
            <div class="my-logo">
                <img src="../MultiTech_Logo.png" alt="MultiTech Logo">
                <h1>RadioBridge Temperature & Humidity Sensor Configuration</h1>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-leftside">
            <ul>
                <li class="item">
                    <img src="../NetworkDashboard-0.1/static/icons/house.svg" width="24" height="24" class="icon-margin" alt="Home">
                    <a href="../index.html">Home</a>
                </li>
            </ul>
        </div>
        <div class="nav-profile">
            <p>&copy; 2024 Multitech Systems, Inc.</p>
            <p>All rights reserved.</p>
        </div>
    </nav>

    <section>
        <div class="container">
            <div style="margin-bottom: 20px;">
                <img src="rbs301-ath.png" alt="RBS301-ATH Sensor" style="max-width: 150px; margin-right: 10px;">
                <img src="rbs306-ath-ext.png" alt="RBS306-ATH Sensor" style="max-width: 200px;">
            </div>


    <!-- =========================== -->
    <!-- REPORTING MODE SECTION      -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Reporting Mode</h3>

        <div class="row">
            <div class="column">
                <label for="notificationType" class="inline-label">Notification Type:</label>
                <select id="notificationType" class="input-medium">
                    <option value="threshold">Threshold</option>
                    <option value="reportOnChange">Report on Change</option>
                </select>
            </div>
            <button id="about-mode" class="help-button">?</button>
        </div>

    </section>


    <!-- =========================== -->
    <!-- THRESHOLD SECTION           -->
    <!-- =========================== -->
    <section id="threshold-section" class="section">

        <h3 class="section-title">Temperature Threshold Settings</h3>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="lowerTempThreshold" class="inline-label lower-label" style="font-weight: normal;">Lower Temperature Threshold (°C):</label>
                <select id="lowerTempThreshold" class="input-small"></select>
            </div>
        </div>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="upperTempThreshold" class="inline-label upper-label" style="font-weight: normal;">Upper Temperature Threshold (°C):</label>
                <select id="upperTempThreshold" class="input-small"></select>
            </div>
        </div>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="restoralMarginTemp" class="inline-label">Restoral Margin - Temperature (°C):</label>
                <select id="restoralMarginTemp" class="input-small"></select>
            </div>
            <button id="about-restoral-temp" class="help-button">?</button>
        </div>

        <h3 class="section-title">Humidity Threshold Settings</h3>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="lowerHumidityThreshold" class="inline-label lower-label" style="color: black; font-weight: normal;">Lower Humidity Threshold (%):</label>
                <select id="lowerHumidityThreshold" class="input-small"></select>
            </div>
        </div>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="upperHumidityThreshold" class="inline-label upper-label" style="color: black; font-weight: normal;">Upper Humidity Threshold (%):</label>
                <select id="upperHumidityThreshold" class="input-small"></select>
            </div>
        </div>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="restoralMarginHumidity" class="inline-label">Restoral Margin - Humidity (%):</label>
                <select id="restoralMarginHumidity" class="input-small"></select>
            </div>
            <button id="about-restoral-hum" class="help-button">?</button>
        </div>

    </section>


    <!-- =========================== -->
    <!-- REPORT ON CHANGE SECTION    -->
    <!-- =========================== -->
    <section id="roc-section" class="section" style="display:none;">

        <h3 class="section-title">Temperature Change Settings</h3>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="tempIncrease" class="inline-label">Temperature Increase (°C):</label>
                <select id="tempIncrease" class="input-small"></select>
            </div>
        </div>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="tempDecrease" class="inline-label">Temperature Decrease (°C):</label>
                <select id="tempDecrease" class="input-small"></select>
            </div>
            <button id="about-temp-roc" class="help-button">?</button>
        </div>

        <h3 class="section-title">Humidity Change Settings</h3>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="humidityIncrease" class="inline-label">Humidity Increase (%):</label>
                <select id="humidityIncrease" class="input-small"></select>
            </div>
        </div>

        <div class="row">
            <div class="column" style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
                <label for="humidityDecrease" class="inline-label">Humidity Decrease (%):</label>
                <select id="humidityDecrease" class="input-small"></select>
            </div>
            <button id="about-hum-roc" class="help-button">?</button>
        </div>

    </section>


    <!-- =========================== -->
    <!-- PERIODIC REPORTING SECTION  -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Periodic Reporting</h3>

        <div class="row">
            <div class="column">
                <label for="periodicReporting" class="inline-label">Time Scale:</label>
                <select id="periodicReporting" class="input-medium">
                    <option value="disabled">Disabled</option>
                    <option value="minutes">Minutes</option>
                    <option value="hours">Hours</option>
                </select>
            </div>

            <div class="column" id="timePeriodContainer" style="display:none;">
                <label for="timePeriod" class="inline-label">Time Period:</label>
                <select id="timePeriod" class="input-small"></select>
            </div>

            <button id="about-periodic" class="help-button">?</button>
        </div>

    </section>


    <!-- =========================== -->
    <!-- GENERATED HEX SECTION       -->
    <!-- =========================== -->
    <section id="hex-section" class="section" style="display:none;">
        <div class="row">
            <h3 class="inline-title">Generated Hexcode:</h3>
            <span id="hex-output" class="hex-display"></span>
        </div>

        <button id="copy-button" class="action-button">Copy Hexcode</button>
        <button id="how-button" class="action-button">How to Use Hexcode</button>
    </section>


    <!-- =========================== -->
    <!-- GENERATE BUTTON             -->
    <!-- =========================== -->
    <button id="generate-button" class="generate-button">
        Generate Hexcode
    </button>


        </div>
    </section>

    <script src="js/script.js?v=1"></script>
</body>
</html>
