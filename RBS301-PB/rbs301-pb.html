        <div class="container">
            <div class="my-logo">
                <img src="../MultiTech_Logo.png" alt="MultiTech Logo">
                <h1>RadioBridge Push Button Sensor Configuration</h1>
            </div>
        </div>
    </header>

    <nav>
        <div class="nav-leftside">
            <ul>

                </li>

                    <img src="../NetworkDashboard-0.1/static/icons/send.svg" width="24" height="24" class="icon-margin" alt="Tools">

                    <img src="../NetworkDashboard-0.1/static/icons/hub.svg" width="24" height="24" class="icon-margin" alt="RadioBridge">

    <section>
        <div class="container">
            <img src="rbs304-1.png" alt="RBS304-1 Push Button Sensor" class="sensor-image" style="max-width: 200px; margin-bottom: 20px;">


    <!-- =========================== -->
    <!-- BUTTON EVENT SETTINGS       -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">Button Event Settings</h3>

        <!-- Enable Button Pressed Event -->
        <div class="row">
            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="enableButtonPressed">
                    Enable Button Pressed Event
                </label>
            </div>
        </div>

        <!-- Enable Button Released Event -->
        <div class="row">
            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="enableButtonReleased">
                    Enable Button Released Event
                </label>
            </div>
        </div>

        <!-- Enable Button Hold Event -->
        <div class="row">
            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="enableButtonHold">
                    Enable Button Hold Event
                </label>
            </div>
        </div>

        <!-- Hold Delay Dropdown -->
        <div class="row" id="holdDelayRow">
            <div class="column">
                <label class="inline-label" for="holdDelay">Hold Delay:</label>
                <select id="holdDelay" class="input-medium">
                    <option value="02">0.5 Seconds</option>
                    <option value="04">1 Second</option>
                    <option value="08">2 Seconds</option>
                    <option value="0C">3 Seconds</option>
                    <option value="10">4 Seconds</option>
                    <option value="14">5 Seconds</option>
                </select>
            </div>
        </div>

    </section>


    <!-- =========================== -->
    <!-- LED SETTINGS                -->
    <!-- =========================== -->
    <section class="section">

        <h3 class="section-title">LED Settings</h3>

        <!-- LED illumination during button press -->
        <div class="row">
            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="ledDuringPress">
                    LED illumination during button press
                </label>
            </div>
        </div>

        <!-- Blink LED after send -->
        <div class="row">
            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="ledAfterSend">
                    Blink LED after send
                </label>
            </div>
        </div>

        <!-- Blink LED after message ACK received -->
        <div class="row">
            <div class="column">
                <label class="inline-label">
                    <input type="checkbox" id="ledAfterAck">
                    Blink LED after message ACK received (confirmed messages only)
                </label>
            </div>
        </div>

    </section>


    <!-- =========================== -->
    <!-- GENERATED HEX SECTION       -->
    <!-- =========================== -->
    <section id="hex-section" class="section" style="display:none;">
        <div class="row">
            <h3 class="inline-title">Generated Hexcode:</h3>
            <span id="hex-output" class="hex-display"></span>
        </div>

        <button id="copy-button" class="action-button">Copy Hexcode</button>
        <button id="how-button" class="action-button">How to Use Hexcode</button>
        <button id="schedule-button" class="action-button" style="background-color: #2196f3; color: white;">Schedule Downlink</button>
    </section>


    <!-- =========================== -->
    <!-- GENERATE BUTTON             -->
    <!-- =========================== -->
    <button id="generate-button" class="generate-button">
        Generate Hexcode
    </button>


        </div>
    </section>

    <script src="js/script.js?v=2"></script>
</body>
